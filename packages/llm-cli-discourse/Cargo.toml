[package]
name = "llm-cli-discourse"
version = "0.1.0"
edition = "2024"
description = "A CLI tool for interacting with the Discourse API - designed to be used by AI agents"
license = "MIT"
repository = "https://github.com/freshtonic/llm-cli-tools"

[dependencies]
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
libc = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
ureq = "3"

[dev-dependencies]
indoc = "2"
